# 全局配置
global:
  namespace: Development
  env_name: dev

# 服务端配置
server:
  app: elysia
  server: backend
  service:
    # backend http 服务
    - name: trpc.elysia.backend.http
      ip: 127.0.0.1
      port: 8001
      network: tcp
      protocol: http_no_protocol
      timeout: 0 # 不设超时，SSE流式接口需要长连接

# 客户端配置
client:
  timeout: 120000
  service:
    # chat-agent RPC 服务
    - name: trpc.elysia.chat_agent.agent.AgentService
      target: ip://127.0.0.1:8081
      timeout: 120000 # 120秒超时，支持长时间流式响应
      network: tcp
      protocol: trpc
    # session AgentSession RPC 服务
    - name: trpc.elysia.session.agent_session.AgentSessionService
      target: ip://127.0.0.1:8002
      timeout: 10000
      network: tcp
      protocol: trpc
    # session Conversation RPC 服务
    - name: trpc.elysia.session.conversation.ConversationService
      target: ip://127.0.0.1:8003
      timeout: 10000
      network: tcp
      protocol: trpc

# 插件配置
plugins:
  # 日志配置
  log:
    default:
      - writer: console
        level: debug
        format: console
      - writer: file
        level: info
        format: json
        writer_config:
          filename: ./logs/trpc.log
          max_size: 100
          max_backups: 10
          max_age: 7
          compress: false
